<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicPulse — Pulse Insights 03</title>

  <!-- LinkedIn App Deep Link -->
  <meta http-equiv="refresh" content="2; url=https://www.linkedin.com/posts/civicpulsehq_pulse-insights-03-activity-7439181192635215872-YJjm?utm_source=share&utm_medium=member_android&rcm=ACoAAFFxcjUBqVPSKhItlQRZlxMmBEHkYacJB4k" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #4f6ef7;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #5a5a72;
      --pulse: #4f6ef7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: var(--accent);
      top: -100px; left: -100px;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: var(--accent2);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 40px;
      max-width: 420px;
      width: calc(100% - 40px);
      text-align: center;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo mark */
    .logomark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    /* Pulse ring animation */
    .pulse-ring {
      position: relative;
      width: 80px; height: 80px;
      margin: 0 auto 28px;
    }
    .pulse-ring::before,
    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: ripple 2s ease-out infinite;
    }
    .pulse-ring::after { animation-delay: -1s; }
    .pulse-dot {
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .pulse-dot svg { width: 14px; height: 14px; fill: #fff; }
    @keyframes ripple {
      0%   { transform: scale(0.6); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* Progress bar */
    .progress-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 3px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      animation: fill 2s linear forwards;
    }
    @keyframes fill {
      to { width: 100%; }
    }

    .status {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .status span {
      color: var(--accent);
    }

    /* CTA button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(79,110,247,0.3);
      cursor: pointer;
      border: none;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(79,110,247,0.45);
    }
    .btn svg { width: 16px; height: 16px; fill: #fff; }

    .hint {
      margin-top: 18px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">

    <div class="logomark">
      <div class="logo-icon">CP</div>
      <div class="logo-text">CivicPulse</div>
    </div>

    <div class="pulse-ring">
      <div class="pulse-dot">
        <!-- LinkedIn icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </div>
    </div>

    <h1>Pulse Insights 03</h1>
    <p class="subtitle">Opening LinkedIn</p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <p class="status">Redirecting you in <span>2s</span>…</p>

    <a class="btn" href="#">
      <!-- Arrow icon -->
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Open Now
    </a>

    <p class="hint">Not redirecting? Tap the button above.<br>Then hit "Open in browser" if prompted.</p>

  </div>

  <script>
    // ============================================
    // 👇 ONLY CHANGE THIS LINE EACH TIME
    const REDIRECT_URL = "https://www.linkedin.com/posts/civicpulsehq_pulse-insights-03-activity-7439181192635215872-YJjm?utm_source=share&utm_medium=member_android&rcm=ACoAAFFxcjUBqVPSKhItlQRZlxMmBEHkYacJB4k";
    // ============================================

    // Set the button href
    document.querySelector('.btn').href = REDIRECT_URL;

    // Countdown + redirect
    let t = 2;
    const span = document.querySelector('.status span');
    const interval = setInterval(() => {
      t--;
      if (t <= 0) {
        clearInterval(interval);
        span.textContent = '0s';
        window.location.href = REDIRECT_URL;
      } else {
        span.textContent = t + 's';
      }
    }, 1000);
  </script>

</body>
</html>
